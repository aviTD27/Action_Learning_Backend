server.port=8000

# File upload limits (student submissions & assignment templates)
# Without these, Spring's default 1MB cap resets the connection on larger files.
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
# Let Tomcat read the full body instead of resetting the connection when the limit is hit.
server.tomcat.max-swallow-size=60MB

# DataSource Configuration (PostgreSQL)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/actionlearning}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Properties
# Keep this on 'update' for normal development (your data persists across restarts).
# NOTE: 'update' cannot retrofit new NOT NULL columns onto tables that already
# contain rows. After a breaking model change (e.g. the Cohort/Programme/Semester/
# Course restructure), run db/reset_database.sql once to drop the schema, then start
# the app ? 'update' recreates everything cleanly and DemoDataSeeder reseeds.
# Full procedure: see DATABASE_SETUP.md at the repo root.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Mail Configuration (SendGrid)
spring.mail.host=smtp.sendgrid.net
spring.mail.port=587
spring.mail.username=apikey
spring.mail.password=${SENDGRID_API_KEY:your-api-key-here}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
app.mail.from=acl.support27@gmail.com

# AI Service Configuration (NLP Engine)
ai.service.url=${AI_SERVICE_URL:https://actionlearningai-production.up.railway.app}

# JWT Configuration
